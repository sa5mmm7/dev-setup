repos:
  - repo: https://github.com/pycqa/ruff-pre-commit
    rev: v0.1.0
    hooks:
      - id: ruff
        args: ["--select=E,F,W,C90", "--line-length=88"]
        stages: [commit, push]
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.16.0
    hooks:
      - id: gitlint
        args: ["--convention=angular", "--commits=HEAD~10..HEAD"]
        stages: [commit-msg]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets-hook
        args: ["--baseline", ".secrets.baseline"]
        stages: [commit]
